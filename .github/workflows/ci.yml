name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Rebuild generated artifacts
        run: npm run build
      - name: Generated files must match the commit
        run: git diff --exit-code
      - name: Full test suite (SKIP counts as failure)
        run: npm run test:strict
